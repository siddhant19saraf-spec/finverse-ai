name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Debug - test import
        working-directory: apps/backend
        run: |
          python -c "import sys; print('PYTHONPATH:', sys.path); import app.main; print('Import OK')"
          python -m pytest --collect-only -q 2>&1 || echo "COLLECTION FAILED"
      - name: Run tests
        working-directory: apps/backend
        run: |
          python -m pytest -v --tb=long 2>&1 || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        working-directory: apps/frontend
        run: pnpm install
      - name: Lint
        working-directory: apps/frontend
        run: pnpm lint || true
      - name: Build
        working-directory: apps/frontend
        run: pnpm build
