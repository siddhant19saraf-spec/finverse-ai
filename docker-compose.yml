version: '3.8'
services:
  frontend:
    build: ./apps/frontend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
  backend:
    build: ./apps/backend
    ports:
      - '8000:8000'
    environment:
      - ENV=development
    volumes:
      - ./apps/backend:/app
